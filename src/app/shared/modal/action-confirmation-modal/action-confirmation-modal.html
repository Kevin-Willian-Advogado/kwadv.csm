@if (isOpen && config) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <button
      type="button"
      class="absolute inset-0 bg-slate-900/45 backdrop-blur-sm"
      aria-label="Fechar modal"
      (click)="closeModal()"
    ></button>

    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="action-confirmation-modal-title"
      class="relative w-full max-w-[540px] overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-[0_30px_80px_rgba(15,23,42,0.22)]"
    >
      <div class="flex items-start gap-4 border-b border-slate-100 px-6 py-5 sm:px-7">
        <div [class]="iconContainerClasses">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M9 12.75 11.25 15 15 9.75m6 2.25A9 9 0 1 1 3 12a9 9 0 0 1 18 0Z"
            ></path>
          </svg>
        </div>

        <div class="min-w-0 flex-1">
          <p [class]="eyebrowClasses">Confirmar acao</p>
          <h2 id="action-confirmation-modal-title" class="mt-1 text-xl font-bold text-slate-900">
            {{ config.title }}
          </h2>
          <p class="mt-2 text-sm leading-6 text-slate-600">
            {{ config.description }}
          </p>
        </div>

        <button
          type="button"
          class="rounded-xl p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 disabled:cursor-not-allowed disabled:opacity-60"
          aria-label="Fechar"
          [disabled]="isBusy"
          (click)="closeModal()"
        >
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <div class="space-y-4 px-6 py-5 sm:px-7">
        @if (config.highlights?.length) {
          <div class="rounded-2xl border border-slate-200 bg-slate-50/80 p-4">
            <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">O que acontece ao confirmar</p>

            <ul class="mt-3 space-y-2">
              @for (highlight of config.highlights; track highlight) {
                <li class="flex items-start gap-2 text-sm leading-6 text-slate-700">
                  <span class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full bg-slate-400"></span>
                  <span>{{ highlight }}</span>
                </li>
              }
            </ul>
          </div>
        }

        @if (config.hint) {
          <div class="rounded-2xl border border-dashed border-slate-200 bg-white px-4 py-3 text-sm leading-6 text-slate-500">
            {{ config.hint }}
          </div>
        }
      </div>

      <div class="flex flex-col-reverse gap-3 border-t border-slate-100 bg-slate-50/70 px-6 py-4 sm:flex-row sm:justify-end sm:px-7">
        <button
          type="button"
          class="inline-flex items-center justify-center rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="isBusy"
          (click)="closeModal()"
        >
          {{ config.cancelLabel || 'Cancelar' }}
        </button>

        <button type="button" [class]="confirmButtonClasses" [disabled]="isBusy" (click)="confirmAction()">
          {{ config.confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
