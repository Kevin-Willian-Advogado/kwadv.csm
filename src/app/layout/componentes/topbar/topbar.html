<header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="px-8 py-4 flex items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">{{ pageTitle }}</h1>
            <p class="text-sm text-slate-500 mt-1">{{ pageDescription }}</p>
        </div>

        @if (showPrimaryAction) {
            <a
                [routerLink]="primaryActionLink"
                class="inline-flex items-center gap-2 px-4 py-2.5 bg-(--color-1) text-white text-sm font-semibold rounded-lg shadow-sm hover:bg-(--color-3) focus:ring-4 focus:ring-blue-100 transition-all"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                {{ primaryActionLabel }}
            </a>
        }
    </div>
</header>
