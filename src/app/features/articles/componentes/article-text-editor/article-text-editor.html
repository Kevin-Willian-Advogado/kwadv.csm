<section class="relative flex h-full min-h-0 min-w-0 overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
  
  <div class="w-full flex-1 min-w-0 overflow-y-auto flex justify-center items-start no-scrollbar bg-slate-100">
    
    <div
      #editorElement
      class="min-h-full w-full bg-white text-justify p-6 md:p-10 lg:p-14 shadow-sm text-slate-700 outline-none border-x border-transparent"
    >
      </div>

  </div>

  <div
    class="w-[72px] shrink-0 bg-white border-l border-slate-200 flex flex-col items-center py-6 gap-6 h-full overflow-y-auto no-scrollbar"
  >
    @if (editor) {
      <div class="flex flex-col gap-2 w-full items-center group">
        <span class="toolbar-group-label">Texto</span>
        <button
          type="button"
          (click)="toggleHeading(2)"
          [class.active]="editor.isActive('heading', { level: 2 })"
          [disabled]="isSaving"
          class="toolbar-button"
          title="Titulo"
        >
          H1
        </button>
        <button
          type="button"
          (click)="toggleHeading(3)"
          [class.active]="editor.isActive('heading', { level: 3 })"
          [disabled]="isSaving"
          class="toolbar-button"
          title="Subtitulo"
        >
          H2
        </button>
        <button
          type="button"
          (click)="toggleParagraph()"
          [class.active]="editor.isActive('paragraph')"
          [disabled]="isSaving"
          class="toolbar-button"
          title="Paragrafo"
        >
          P
        </button>
      </div>

      <div class="flex flex-col gap-2 w-full items-center group">
        <span class="toolbar-group-label">Estilo</span>
        <button
          type="button"
          (click)="toggleBold()"
          [class.active]="editor.isActive('bold')"
          [disabled]="isSaving"
          class="toolbar-button"
          title="Negrito"
        >
          B
        </button>
        <button
          type="button"
          (click)="toggleItalic()"
          [class.active]="editor.isActive('italic')"
          [disabled]="isSaving"
          class="toolbar-button"
          title="Italico"
        >
          <em>I</em>
        </button>
        <button
          type="button"
          (click)="toggleUnderline()"
          [class.active]="editor.isActive('underline')"
          [disabled]="isSaving"
          class="toolbar-button"
          title="Sublinhado"
        >
          <u>U</u>
        </button>
      </div>

      <div class="flex flex-col gap-2 w-full items-center group">
        <span class="toolbar-group-label">Listas</span>
        <button
          type="button"
          (click)="toggleBulletList()"
          [class.active]="editor.isActive('bulletList')"
          [disabled]="isSaving"
          class="toolbar-button"
          title="Lista"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6h.01M3 12h.01M3 18h.01M8 6h13M8 12h13M8 18h13" />
          </svg>
        </button>
        <button
          type="button"
          (click)="toggleOrderedList()"
          [class.active]="editor.isActive('orderedList')"
          [disabled]="isSaving"
          class="toolbar-button"
          title="Lista numerada"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6h11M10 12h11M10 18h11M4 4h1v4M4 11h2M3 18h3l-2 2" />
          </svg>
        </button>
      </div>

      <div class="flex flex-col gap-2 w-full items-center group">
        <span class="toolbar-group-label">Inserir</span>
        <button
          type="button"
          (click)="addLink()"
          [class.active]="editor.isActive('link')"
          [disabled]="isSaving || insertToolsDisabled"
          class="toolbar-button"
          title="Link indisponivel"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L10 5M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07L14 19" />
          </svg>
        </button>
        <button
          type="button"
          (click)="addImage()"
          [disabled]="isSaving || insertToolsDisabled"
          class="toolbar-button"
          title="Imagem indisponivel"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m4 16 4.6-4.6a2 2 0 0 1 2.8 0L16 16m-2-2 1.6-1.6a2 2 0 0 1 2.8 0L20 14m-6-8h.01M6 20h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z" />
          </svg>
        </button>
      </div>
    }
  </div>
</section>
