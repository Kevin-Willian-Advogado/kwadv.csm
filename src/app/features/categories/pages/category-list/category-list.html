<section class="p-8">
    <app-categories-list-table (categorySelected)="openEditModal($event)"></app-categories-list-table>
</section>

@if (isEditorOpen) {
    <div class="fixed inset-0 z-[70] flex items-center justify-center p-4">
        <button type="button" class="absolute inset-0 bg-slate-950/50 backdrop-blur-sm" aria-label="Fechar" (click)="closeEditor()"></button>
        <div class="relative max-h-[92vh] w-full max-w-4xl overflow-y-auto rounded-2xl bg-white shadow-2xl">
            <app-category-detail
                [modalMode]="true"
                [selectedCategoryId]="selectedCategoryId"
                (closed)="closeEditor()"
                (saved)="handleMutation()"
                (deleted)="handleMutation()"
            ></app-category-detail>
        </div>
    </div>
}
